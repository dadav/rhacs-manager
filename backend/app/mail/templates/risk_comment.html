<!DOCTYPE html>
<html lang="de">
<head><meta charset="utf-8"><title>Neuer Kommentar</title></head>
<body style="font-family:Arial,sans-serif;background:#f5f5f5;margin:0;padding:20px">
<div style="max-width:600px;margin:auto;background:#fff;border-radius:4px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.1)">
  <div style="background:#151515;padding:20px 30px">
    <h1 style="color:#fff;margin:0;font-size:18px">RHACS CVE Manager</h1>
  </div>
  <div style="padding:30px">
    <h2 style="color:#151515;margin-top:0">Neuer Kommentar zur Risikoakzeptanz</h2>
    <p>Es gibt einen neuen Kommentar für die Risikoakzeptanz von <strong>{{ cve_id }}</strong>.</p>
    <div style="background:#f0f0f0;border-left:4px solid #0066cc;padding:12px 16px;margin:16px 0;border-radius:2px">
      <p style="margin:0 0 6px 0"><strong>Von:</strong> {{ author_name }}</p>
      <p style="margin:0;white-space:pre-wrap">{{ comment_text }}</p>
    </div>
    <a href="{{ link }}" style="display:inline-block;background:#0066cc;color:#fff;padding:10px 20px;text-decoration:none;border-radius:4px;margin-top:10px">Zum Antrag</a>
  </div>
  <div style="background:#f0f0f0;padding:16px 30px;font-size:12px;color:#666">
    Dies ist eine automatische Benachrichtigung vom RHACS CVE Manager.
  </div>
</div>
</body>
</html>
