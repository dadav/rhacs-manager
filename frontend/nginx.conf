server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy MCP requests to the local MCP server sidecar
    # Identity headers are already injected by auth-header-injector
    location /mcp {
        proxy_pass http://localhost:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-User $http_x_forwarded_user;
        proxy_set_header X-Forwarded-Email $http_x_forwarded_email;
        proxy_set_header X-Forwarded-Groups $http_x_forwarded_groups;
        proxy_set_header X-Forwarded-Namespaces $http_x_forwarded_namespaces;
        proxy_set_header X-Forwarded-Namespace-Emails $http_x_forwarded_namespace_emails;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
