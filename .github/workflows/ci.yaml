name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  trivy-image-scan:
    name: Trivy Image CVE Scan (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: backend
            dockerfile: backend/Containerfile
            image: rhacs-manager-backend
          - name: frontend-spoke
            context: frontend
            dockerfile: frontend/Containerfile.spoke
            image: rhacs-manager-spoke
          - name: namespace-resolver
            context: namespace-resolver
            dockerfile: namespace-resolver/Containerfile
            image: rhacs-manager-namespace-resolver
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scanning
        run: |
          docker build \
            -t "local/${{ matrix.image }}:ci-${{ github.sha }}" \
            -f "${{ matrix.dockerfile }}" \
            "${{ matrix.context }}"
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: image
          image-ref: local/${{ matrix.image }}:ci-${{ github.sha }}
          scanners: vuln
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --dev
        working-directory: backend
      - run: uv run pytest
        working-directory: backend
