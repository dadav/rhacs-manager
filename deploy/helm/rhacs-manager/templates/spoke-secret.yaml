{{- if and (eq (default "hub" .Values.mode) "spoke") .Values.spoke.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.spoke.secret.name }}
  namespace: {{ include "rhacs-manager.namespace" . }}
  labels:
    {{- include "rhacs-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  HUB_API_URL: {{ required "spoke.secret.stringData.HUB_API_URL is required in spoke mode" .Values.spoke.secret.stringData.HUB_API_URL | quote }}
  SPOKE_API_KEY: {{ required "spoke.secret.stringData.SPOKE_API_KEY is required in spoke mode" .Values.spoke.secret.stringData.SPOKE_API_KEY | quote }}
  CLUSTER_NAME: {{ required "spoke.secret.stringData.CLUSTER_NAME is required in spoke mode" .Values.spoke.secret.stringData.CLUSTER_NAME | quote }}
{{- end }}
