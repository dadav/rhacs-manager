{{- if eq (default "hub" .Values.mode) "spoke" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.spoke.frontend.serviceName }}
  namespace: {{ include "rhacs-manager.namespace" . }}
  labels:
    {{- include "rhacs-manager.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.spoke.service.annotations | nindent 4 }}
spec:
  selector:
    app: {{ .Values.spoke.frontend.deploymentName }}
  ports:
    - name: {{ .Values.spoke.service.portName }}
      port: {{ .Values.spoke.service.port }}
      targetPort: {{ .Values.spoke.service.targetPort }}
    {{- if and .Values.spoke.mcp.enabled .Values.spoke.mcp.plainHttp.enabled }}
    - name: mcp-http
      port: {{ .Values.spoke.mcp.plainHttp.port }}
      targetPort: {{ .Values.spoke.mcp.plainHttp.port }}
    {{- end }}
{{- end }}
