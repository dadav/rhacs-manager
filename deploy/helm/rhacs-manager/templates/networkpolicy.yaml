{{- if and (eq (default "hub" .Values.mode) "hub") .Values.networkPolicy.enabled }}
# NetworkPolicy in the StackRox namespace to allow ingress from rhacs-manager backend
# to the central-db service. Must be applied with permissions to create resources
# in the {{ .Values.networkPolicy.stackroxNamespace }} namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rhacs-manager-to-central-db
  namespace: {{ .Values.networkPolicy.stackroxNamespace }}
  labels:
    {{- include "rhacs-manager.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- toYaml .Values.networkPolicy.centralDbPodSelector | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{ .Values.networkPolicy.sourceNamespaceLabel }}: {{ include "rhacs-manager.namespace" . }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.backendPodSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.port }}
{{- end }}
