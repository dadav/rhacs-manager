{{- if and (eq (default "hub" .Values.mode) "spoke") .Values.spoke.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.spoke.route.name }}
  namespace: {{ include "rhacs-manager.namespace" . }}
  labels:
    {{- include "rhacs-manager.labels" . | nindent 4 }}
spec:
  host: {{ required "spoke.route.host is required in spoke mode" .Values.spoke.route.host }}
  to:
    kind: Service
    name: {{ .Values.spoke.frontend.serviceName }}
  port:
    targetPort: {{ .Values.spoke.service.portName }}
  tls:
    termination: {{ .Values.spoke.route.tls.termination }}
    insecureEdgeTerminationPolicy: {{ .Values.spoke.route.tls.insecureEdgeTerminationPolicy }}
{{- end }}
