{{- if and (eq (default "hub" .Values.mode) "hub") .Values.mcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mcp.serviceName }}
  namespace: {{ include "rhacs-manager.namespace" . }}
  labels:
    {{- include "rhacs-manager.labels" . | nindent 4 }}
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: {{ .Values.mcp.oauthProxy.tlsSecretName }}
spec:
  selector:
    app: {{ .Values.mcp.deploymentName }}
  ports:
    - port: 8443
      targetPort: 8443
      name: oauth-proxy
{{- end }}
