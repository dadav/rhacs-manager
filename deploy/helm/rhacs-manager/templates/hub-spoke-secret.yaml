{{- if and (eq (default "hub" .Values.mode) "hub") .Values.frontend.enabled .Values.frontend.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.frontend.secret.name }}
  namespace: {{ include "rhacs-manager.namespace" . }}
  labels:
    {{- include "rhacs-manager.labels" . | nindent 4 }}
type: Opaque
stringData:
  HUB_API_URL: {{ .Values.frontend.secret.stringData.HUB_API_URL | quote }}
  SPOKE_API_KEY: {{ .Values.frontend.secret.stringData.SPOKE_API_KEY | quote }}
  CLUSTER_NAME: {{ .Values.frontend.secret.stringData.CLUSTER_NAME | quote }}
{{- end }}
