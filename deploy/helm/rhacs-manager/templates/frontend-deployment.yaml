{{- $isHub := eq (default "hub" .Values.mode) "hub" -}}
{{- $isSpoke := eq (default "hub" .Values.mode) "spoke" -}}
{{- if or (and $isHub .Values.frontend.enabled) $isSpoke }}
{{- /* Resolve mode-specific values */}}
{{- $oauthProxy := ternary .Values.frontend.oauthProxy .Values.spoke.oauthProxy $isHub -}}
{{- $authHeaderInjector := ternary .Values.frontend.authHeaderInjector .Values.spoke.authHeaderInjector $isHub -}}
{{- $feVals := ternary .Values.frontend .Values.spoke.frontend $isHub -}}
{{- $deploymentName := ternary .Values.frontend.deploymentName .Values.spoke.frontend.deploymentName $isHub -}}
{{- $replicaCount := ternary .Values.frontend.replicaCount .Values.spoke.frontend.replicaCount $isHub -}}
{{- $secretName := ternary .Values.frontend.secret.name .Values.spoke.secret.name $isHub -}}
{{- $podAnnotations := ternary .Values.frontend.podAnnotations .Values.spoke.frontend.podAnnotations $isHub -}}
{{- $podSecurityContext := ternary .Values.frontend.podSecurityContext .Values.spoke.frontend.podSecurityContext $isHub -}}
{{- $securityContext := ternary .Values.frontend.securityContext .Values.spoke.frontend.securityContext $isHub -}}
{{- $nodeSelector := ternary .Values.frontend.nodeSelector .Values.spoke.frontend.nodeSelector $isHub -}}
{{- $tolerations := ternary .Values.frontend.tolerations .Values.spoke.frontend.tolerations $isHub -}}
{{- $affinity := ternary .Values.frontend.affinity .Values.spoke.frontend.affinity $isHub -}}
{{- $topologySpreadConstraints := ternary .Values.frontend.topologySpreadConstraints .Values.spoke.frontend.topologySpreadConstraints $isHub -}}
{{- $cookieSecretMsg := ternary "frontend.oauthProxy.cookieSecret is required" "spoke.oauthProxy.cookieSecret is required in spoke mode" $isHub -}}
{{- /* Resolve MCP sidecar config */}}
{{- $mcpEnabled := ternary .Values.mcp.enabled (and .Values.spoke.mcp .Values.spoke.mcp.enabled | default false) $isHub -}}
{{- $mcpVals := ternary .Values.mcp .Values.spoke.mcp $isHub -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $deploymentName }}
  namespace: {{ include "rhacs-manager.namespace" . }}
  labels:
    {{- include "rhacs-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ $replicaCount }}
  selector:
    matchLabels:
      app: {{ $deploymentName }}
  template:
    {{- $app := dict
      "name" "frontend"
      "image" $feVals.image
      "port" 8080
      "resources" $feVals.resources
      "readinessProbe" $feVals.readinessProbe
      "envFrom" (list (dict "secretRef" (dict "name" $secretName)))
    -}}
    {{- /* Build MCP sidecar container when enabled */}}
    {{- $extraContainers := list -}}
    {{- if $mcpEnabled -}}
      {{- $mcpBackendUrl := ternary
        (printf "http://%s:%v" .Values.backend.serviceName .Values.backend.service.port)
        ""
        $isHub
      -}}
      {{- $mcpApiKeySecretName := ternary
        (default "rhacs-manager-mcp" (dig "secret" "name" "" $mcpVals))
        $secretName
        $isHub
      -}}
      {{- $mcpApiKeySecretKey := ternary "MCP_API_KEY" "SPOKE_API_KEY" $isHub -}}
      {{- $mcpEnv := list
        (dict "name" "UV_CACHE_DIR" "value" "/tmp/uv-cache")
        (dict "name" "MCP_PORT" "value" "8001")
        (dict "name" "MCP_READONLY" "value" ($mcpVals.readonly | toString))
        (dict "name" "MCP_API_KEY" "valueFrom" (dict "secretKeyRef" (dict "name" $mcpApiKeySecretName "key" $mcpApiKeySecretKey)))
      -}}
      {{- if $isHub -}}
        {{- $mcpEnv = append $mcpEnv (dict "name" "MCP_BACKEND_URL" "value" $mcpBackendUrl) -}}
      {{- else -}}
        {{- $mcpEnv = append $mcpEnv (dict "name" "MCP_BACKEND_URL" "valueFrom" (dict "secretKeyRef" (dict "name" $secretName "key" "HUB_API_URL"))) -}}
      {{- end -}}
      {{- if $mcpVals.caBundle -}}
        {{- $mcpEnv = append $mcpEnv (dict "name" "MCP_CA_BUNDLE" "value" $mcpVals.caBundle) -}}
      {{- end -}}
      {{- $mcpContainer := dict
        "name" "mcp-server"
        "image" (printf "%s:%s" $mcpVals.image.repository (include "rhacs-manager.imageTag" (dict "tag" $mcpVals.image.tag "chart" .Chart)))
        "imagePullPolicy" $mcpVals.image.pullPolicy
        "command" (list "uv" "run" "--offline" "--no-sync" "python" "-m" "mcp_server")
        "ports" (list (dict "containerPort" 8001))
        "env" $mcpEnv
        "resources" $mcpVals.resources
        "volumeMounts" (list (dict "name" "mcp-cabundle" "mountPath" "/etc/pki/tls/service-ca" "readOnly" true))
      -}}
      {{- if $mcpVals.securityContext -}}
        {{- $mcpContainer = merge $mcpContainer (dict "securityContext" $mcpVals.securityContext) -}}
      {{- end -}}
      {{- $extraContainers = list $mcpContainer -}}
    {{- end -}}
    {{- $args := dict
      "deploymentName" $deploymentName
      "selectorLabels" (include "rhacs-manager.selectorLabels" .)
      "podAnnotations" $podAnnotations
      "oauthProxy" (merge (dict "cookieSecret" (required $cookieSecretMsg $oauthProxy.cookieSecret)) $oauthProxy)
      "authHeaderInjector" $authHeaderInjector
      "app" $app
      "secretName" $secretName
      "imagePullSecrets" .Values.global.imagePullSecrets
      "podSecurityContext" $podSecurityContext
      "securityContext" $securityContext
      "nodeSelector" $nodeSelector
      "tolerations" $tolerations
      "affinity" $affinity
      "topologySpreadConstraints" $topologySpreadConstraints
      "extraContainers" $extraContainers
      "extraVolumes" (ternary (list (dict "name" "mcp-cabundle" "configMap" (dict "name" "rhacs-manager-mcp-cabundle"))) list $mcpEnabled)
      "mcpPlainHttp" (and $mcpEnabled (dig "plainHttp" "enabled" false $mcpVals))
      "mcpPlainHttpPort" (dig "plainHttp" "port" 8082 $mcpVals)
      "chart" .Chart
    -}}
    {{- include "rhacs-manager.oauthProxyPodSpec" $args | nindent 4 }}
{{- end }}
