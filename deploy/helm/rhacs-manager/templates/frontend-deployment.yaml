{{- $isHub := eq (default "hub" .Values.mode) "hub" -}}
{{- $isSpoke := eq (default "hub" .Values.mode) "spoke" -}}
{{- if or (and $isHub .Values.frontend.enabled) $isSpoke }}
{{- /* Resolve mode-specific values */}}
{{- $oauthProxy := ternary .Values.frontend.oauthProxy .Values.spoke.oauthProxy $isHub -}}
{{- $authHeaderInjector := ternary .Values.frontend.authHeaderInjector .Values.spoke.authHeaderInjector $isHub -}}
{{- $fe := ternary (dict "image" .Values.frontend.image "resources" .Values.frontend.resources "readinessProbe" .Values.frontend.readinessProbe) (dict "image" .Values.spoke.frontend.image "resources" .Values.spoke.frontend.resources "readinessProbe" .Values.spoke.frontend.readinessProbe) $isHub -}}
{{- $deploymentName := ternary .Values.frontend.deploymentName .Values.spoke.frontend.deploymentName $isHub -}}
{{- $replicaCount := ternary .Values.frontend.replicaCount .Values.spoke.frontend.replicaCount $isHub -}}
{{- $secretName := ternary .Values.frontend.secret.name .Values.spoke.secret.name $isHub -}}
{{- $podAnnotations := ternary .Values.frontend.podAnnotations .Values.spoke.frontend.podAnnotations $isHub -}}
{{- $podSecurityContext := ternary .Values.frontend.podSecurityContext .Values.spoke.frontend.podSecurityContext $isHub -}}
{{- $securityContext := ternary .Values.frontend.securityContext .Values.spoke.frontend.securityContext $isHub -}}
{{- $nodeSelector := ternary .Values.frontend.nodeSelector .Values.spoke.frontend.nodeSelector $isHub -}}
{{- $tolerations := ternary .Values.frontend.tolerations .Values.spoke.frontend.tolerations $isHub -}}
{{- $affinity := ternary .Values.frontend.affinity .Values.spoke.frontend.affinity $isHub -}}
{{- $cookieSecretMsg := ternary "frontend.oauthProxy.cookieSecret is required" "spoke.oauthProxy.cookieSecret is required in spoke mode" $isHub -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $deploymentName }}
  namespace: {{ include "rhacs-manager.namespace" . }}
  labels:
    {{- include "rhacs-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ $replicaCount }}
  selector:
    matchLabels:
      app: {{ $deploymentName }}
  template:
    {{- $args := dict
      "deploymentName" $deploymentName
      "selectorLabels" (include "rhacs-manager.selectorLabels" .)
      "podAnnotations" $podAnnotations
      "oauthProxy" (merge (dict "cookieSecret" (required $cookieSecretMsg $oauthProxy.cookieSecret)) $oauthProxy)
      "authHeaderInjector" $authHeaderInjector
      "frontend" $fe
      "secretName" $secretName
      "imagePullSecrets" .Values.global.imagePullSecrets
      "podSecurityContext" $podSecurityContext
      "securityContext" $securityContext
      "nodeSelector" $nodeSelector
      "tolerations" $tolerations
      "affinity" $affinity
      "chart" .Chart
    -}}
    {{- include "rhacs-manager.frontendPodSpec" $args | nindent 4 }}
{{- end }}
