{{- if and (eq (default "hub" .Values.mode) "hub") .Values.mcp.enabled .Values.mcp.route.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ .Values.mcp.route.name }}
  namespace: {{ include "rhacs-manager.namespace" . }}
  labels:
    {{- include "rhacs-manager.labels" . | nindent 4 }}
spec:
  host: {{ required "mcp.route.host is required when mcp.route.enabled=true" .Values.mcp.route.host }}
  to:
    kind: Service
    name: {{ .Values.mcp.serviceName }}
  port:
    targetPort: {{ .Values.mcp.service.targetPort }}
  tls:
    termination: {{ .Values.mcp.route.tls.termination }}
    insecureEdgeTerminationPolicy: {{ .Values.mcp.route.tls.insecureEdgeTerminationPolicy }}
{{- end }}
