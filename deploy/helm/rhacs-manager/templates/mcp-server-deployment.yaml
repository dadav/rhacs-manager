{{- if and (eq (default "hub" .Values.mode) "hub") .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mcp.deploymentName }}
  namespace: {{ include "rhacs-manager.namespace" . }}
  labels:
    {{- include "rhacs-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.mcp.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.mcp.deploymentName }}
  template:
    {{- $mcpEnv := list
      (dict "name" "UV_CACHE_DIR" "value" "/tmp/uv-cache")
      (dict "name" "MCP_BACKEND_URL" "value" (printf "http://%s:%v" .Values.backend.serviceName .Values.backend.service.port))
      (dict "name" "MCP_PORT" "value" (.Values.mcp.service.targetPort | toString))
      (dict "name" "MCP_READONLY" "value" (.Values.mcp.readonly | toString))
      (dict "name" "MCP_API_KEY" "valueFrom" (dict "secretKeyRef" (dict "name" .Values.mcp.secret.name "key" "MCP_API_KEY")))
    -}}
    {{- $app := dict
      "name" "mcp-server"
      "image" .Values.mcp.image
      "port" (.Values.mcp.service.targetPort | int)
      "command" (list "uv" "run" "--offline" "--no-sync" "python" "-m" "mcp_server")
      "env" $mcpEnv
      "resources" .Values.mcp.resources
      "readinessProbe" .Values.mcp.readinessProbe
      "livenessProbe" .Values.mcp.livenessProbe
    -}}
    {{- $cookieSecretMsg := "mcp.oauthProxy.cookieSecret is required when mcp.enabled=true" -}}
    {{- $args := dict
      "deploymentName" .Values.mcp.deploymentName
      "selectorLabels" (include "rhacs-manager.selectorLabels" .)
      "podAnnotations" .Values.mcp.podAnnotations
      "oauthProxy" (merge (dict "cookieSecret" (required $cookieSecretMsg .Values.mcp.oauthProxy.cookieSecret)) .Values.mcp.oauthProxy)
      "authHeaderInjector" .Values.mcp.authHeaderInjector
      "app" $app
      "secretName" .Values.mcp.secret.name
      "imagePullSecrets" .Values.global.imagePullSecrets
      "podSecurityContext" .Values.mcp.podSecurityContext
      "securityContext" .Values.mcp.securityContext
      "nodeSelector" .Values.mcp.nodeSelector
      "tolerations" .Values.mcp.tolerations
      "affinity" .Values.mcp.affinity
      "topologySpreadConstraints" list
      "chart" .Chart
    -}}
    {{- include "rhacs-manager.oauthProxyPodSpec" $args | nindent 4 }}
{{- end }}
