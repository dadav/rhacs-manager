{{- if and (eq (default "hub" .Values.mode) "hub") .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mcp.deploymentName }}
  namespace: {{ include "rhacs-manager.namespace" . }}
  labels:
    {{- include "rhacs-manager.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.mcp.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.mcp.deploymentName }}
  template:
    metadata:
      labels:
        app: {{ .Values.mcp.deploymentName }}
        {{- include "rhacs-manager.selectorLabels" . | nindent 8 }}
      {{- with .Values.mcp.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mcp-server
          image: "{{ .Values.mcp.image.repository }}:{{ include "rhacs-manager.imageTag" (dict "tag" .Values.mcp.image.tag "chart" .Chart) }}"
          imagePullPolicy: {{ .Values.mcp.image.pullPolicy }}
          command: ["uv", "run", "python", "-m", "mcp_server"]
          ports:
            - containerPort: {{ .Values.mcp.service.targetPort }}
          env:
            - name: UV_CACHE_DIR
              value: /tmp/uv-cache
            - name: MCP_BACKEND_URL
              value: "http://{{ .Values.backend.serviceName }}:{{ .Values.backend.service.port }}"
            - name: MCP_PORT
              value: {{ .Values.mcp.service.targetPort | quote }}
            - name: MCP_READONLY
              value: {{ .Values.mcp.readonly | quote }}
          {{- with .Values.mcp.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /mcp
              port: {{ .Values.mcp.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /mcp
              port: {{ .Values.mcp.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 30
      {{- with .Values.mcp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.mcp.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
