nameOverride: ""
fullnameOverride: ""

# Supported modes: hub, spoke
mode: hub

namespace:
  create: true
  name: rhacs-manager

database:
  cnpg:
    enabled: true
    clusterName: rhacs-manager-db
    instances: 1
    database: rhacs_manager
    owner: rhacs_manager
    storage:
      size: 5Gi

backend:
  enabled: true
  deploymentName: rhacs-manager-backend
  serviceName: rhacs-manager-backend
  replicaCount: 1
  image:
    repository: ghcr.io/dadav/rhacs-manager-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8000
    targetPort: 8000
  secret:
    create: true
    name: rhacs-manager-backend-secret
    stringData:
      SECRET_KEY: "change-me-to-a-random-secret"
      DEV_MODE: "false"
      DEV_USER_ID: ""
      DEV_USER_NAME: ""
      DEV_USER_EMAIL: ""
      DEV_USER_ROLE: "team_member"
      DEV_USER_NAMESPACES: ""
      SMTP_HOST: "smtp.example.com"
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: "rhacs-manager@example.com"
      SMTP_STARTTLS: "true"
      APP_BASE_URL: "https://rhacs-manager.example.com"
      MANAGEMENT_EMAIL: ""
      SPOKE_API_KEYS: "[]"
      SEC_TEAM_GROUP: "rhacs-sec-team"
  env:
    appDbHost: rhacs-manager-db-rw
    appDbSecretName: rhacs-manager-db-app
    appDbUserKey: username
    appDbPasswordKey: password
    appDbName: rhacs_manager
    stackroxDbHost: central-db.stackrox.svc
    stackroxDbPort: "5432"
    stackroxDbUser: postgres
    stackroxDbName: central_active
    stackroxDbPasswordSecretName: central-db-password
    stackroxDbPasswordKey: password
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
  livenessProbe:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 30

frontend:
  enabled: true
  deploymentName: rhacs-manager-frontend
  serviceName: rhacs-manager-frontend
  replicaCount: 1
  image:
    repository: ghcr.io/dadav/rhacs-manager-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8080
    targetPort: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10

route:
  enabled: true
  frontend:
    name: rhacs-manager
    host: rhacs-manager.apps.example.com
  backend:
    name: rhacs-manager-api
    host: rhacs-manager-api.apps.example.com
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

spoke:
  secret:
    create: true
    name: rhacs-manager-spoke-secret
    stringData:
      HUB_API_URL: "https://rhacs-manager-api.hub.example.com"
      SPOKE_API_KEY: "change-me-to-match-hub-key"
      CLUSTER_NAME: "spoke-cluster-name"

  oauthProxy:
    serviceAccountName: rhacs-manager-oauth-proxy
    image:
      repository: quay.io/openshift/origin-oauth-proxy
      tag: "4.14"
      pullPolicy: IfNotPresent
    cookieSecret: ""
    tlsSecretName: rhacs-manager-oauth-proxy-tls
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    authDelegatorClusterRoleBindingName: rhacs-manager-oauth-proxy-review

  namespaceResolver:
    image:
      repository: ghcr.io/dadav/rhacs-manager-namespace-resolver
      tag: latest
      pullPolicy: IfNotPresent
    namespaceAnnotation: rhacs-manager.io/users
    cacheTtlSeconds: "300"
    clusterRoleName: rhacs-manager-namespace-reader
    clusterRoleBindingName: rhacs-manager-namespace-reader
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi

  frontend:
    deploymentName: rhacs-manager-frontend
    serviceName: rhacs-manager-frontend
    replicaCount: 1
    image:
      repository: ghcr.io/dadav/rhacs-manager-spoke
      tag: latest
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    readinessProbe:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10

  service:
    annotations:
      service.beta.openshift.io/serving-cert-secret-name: rhacs-manager-oauth-proxy-tls
    portName: oauth-proxy
    port: 8443
    targetPort: 8443

  route:
    enabled: true
    name: rhacs-manager
    host: rhacs-manager.spoke.example.com
    tls:
      termination: reencrypt
      insecureEdgeTerminationPolicy: Redirect
