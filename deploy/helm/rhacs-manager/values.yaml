# yaml-language-server: $schema=values.schema.json

nameOverride: ""
fullnameOverride: ""

# Supported modes: hub, spoke
mode: hub

namespace:
  create: true
  name: rhacs-manager

database:
  cnpg:
    enabled: true
    clusterName: rhacs-manager-db
    instances: 2
    database: rhacs_manager
    owner: rhacs_manager
    storage:
      size: 5Gi

global:
  imagePullSecrets: []

# Optional NetworkPolicy for StackRox central-db access (hub only).
# Targets the stackrox namespace — review before enabling.
networkPolicy:
  enabled: false
  stackroxNamespace: stackrox
  centralDbPodSelector:
    app.kubernetes.io/name: central-db
  backendPodSelector:
    app: rhacs-manager-backend
  sourceNamespaceLabel: kubernetes.io/metadata.name
  port: 5432

backend:
  enabled: true
  deploymentName: rhacs-manager-backend
  serviceName: rhacs-manager-backend
  serviceAccountName: rhacs-manager-backend
  replicaCount: 2
  image:
    repository: ghcr.io/dadav/rhacs-manager-backend
    # Defaults to Chart.appVersion if not set
    tag: ""
    pullPolicy: IfNotPresent
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app: rhacs-manager-backend
  service:
    port: 8000
    targetPort: 8000
  secret:
    create: true
    name: rhacs-manager-backend-secret
    stringData:
      SECRET_KEY: "change-me-to-a-random-secret"
      DEV_MODE: "false"
      DEV_USER_ID: ""
      DEV_USER_NAME: ""
      DEV_USER_EMAIL: ""
      DEV_USER_ROLE: "team_member"
      DEV_USER_NAMESPACES: ""
      SMTP_HOST: "smtp.example.com"
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_FROM: "rhacs-manager@example.com"
      SMTP_TLS: "false"
      SMTP_STARTTLS: "true"
      SMTP_VALIDATE_CERTS: "true"
      APP_BASE_URL: "https://rhacs-manager.example.com"
      BADGE_BASE_URL: "https://rhacs-manager-api.example.com"
      MANAGEMENT_EMAIL: ""
      DEFAULT_ESCALATION_EMAIL: ""
      SPOKE_API_KEYS: "[]"
      SEC_TEAM_GROUP: "rhacs-sec-team"
  env:
    appDbHost: rhacs-manager-db-rw
    appDbSecretName: rhacs-manager-db-app
    appDbUserKey: username
    appDbPasswordKey: password
    appDbName: rhacs_manager
    stackroxDbHost: central-db.stackrox.svc
    stackroxDbPort: "5432"
    stackroxDbUser: postgres
    stackroxDbName: central_active
    stackroxDbPasswordSecretName: central-db-password
    stackroxDbPasswordKey: password
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  startupProbe:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
    successThreshold: 1
  readinessProbe:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  livenessProbe:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 30
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1

# Hub frontend — spoke-style 3-container pod (oauth-proxy + auth-header-injector + spoke-nginx)
frontend:
  enabled: true
  deploymentName: rhacs-manager-frontend
  serviceName: rhacs-manager-frontend
  replicaCount: 2
  # Spoke frontend image (nginx with envsubst + API proxy)
  image:
    repository: ghcr.io/dadav/rhacs-manager-spoke
    # Defaults to Chart.appVersion if not set
    tag: ""
    pullPolicy: IfNotPresent
  podAnnotations: {}
  podSecurityContext:
    runAsNonRoot: true
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: [ALL]
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app: rhacs-manager-frontend
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
    successThreshold: 1
  # Hub-local spoke secret (points /api/* to the local backend service)
  secret:
    create: true
    name: rhacs-manager-hub-spoke-secret
    stringData:
      HUB_API_URL: "http://rhacs-manager-backend:8000"
      SPOKE_API_KEY: "change-me-to-match-hub-key"
      CLUSTER_NAME: "hub"
  oauthProxy:
    serviceAccountName: rhacs-manager-oauth-proxy
    image:
      repository: registry.redhat.io/openshift4/ose-oauth-proxy
      tag: "v4.14"
      pullPolicy: IfNotPresent
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    cookieSecret: ""
    cookieRefresh: "12h"
    tlsSecretName: rhacs-manager-oauth-proxy-tls
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    authDelegatorClusterRoleBindingName: rhacs-manager-oauth-proxy-review
  authHeaderInjector:
    image:
      repository: ghcr.io/dadav/rhacs-manager-auth-header-injector
      # Defaults to Chart.appVersion if not set
      tag: ""
      pullPolicy: IfNotPresent
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    namespaceAnnotation: rhacs-manager.io/users
    groupAnnotation: rhacs-manager.io/groups
    emailAnnotation: rhacs-manager.io/escalation-email
    cacheTtlSeconds: "300"
    groupCacheTtlSeconds: "60"
    allNamespacesGroups: "" # comma-separated groups that get wildcard (*) namespace access
    clusterRoleName: rhacs-manager-namespace-reader
    clusterRoleBindingName: rhacs-manager-namespace-reader
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    readinessProbe:
      path: /healthz
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
      successThreshold: 1
  service:
    annotations:
      service.beta.openshift.io/serving-cert-secret-name: rhacs-manager-oauth-proxy-tls
    portName: oauth-proxy
    port: 8443
    targetPort: 8443

route:
  enabled: true
  frontend:
    name: rhacs-manager
    host: rhacs-manager.apps.example.com
  backend:
    name: rhacs-manager-api
    host: rhacs-manager-api.apps.example.com
  tls:
    frontend:
      termination: reencrypt
      insecureEdgeTerminationPolicy: Redirect
    backend:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

spoke:
  secret:
    create: true
    name: rhacs-manager-spoke-secret
    stringData:
      HUB_API_URL: "https://rhacs-manager-api.hub.example.com"
      SPOKE_API_KEY: "change-me-to-match-hub-key"
      CLUSTER_NAME: "spoke-cluster-name"

  oauthProxy:
    serviceAccountName: rhacs-manager-oauth-proxy
    image:
      repository: registry.redhat.io/openshift4/ose-oauth-proxy
      tag: "v4.14"
      pullPolicy: IfNotPresent
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    cookieSecret: ""
    cookieRefresh: "12h"
    tlsSecretName: rhacs-manager-oauth-proxy-tls
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    authDelegatorClusterRoleBindingName: rhacs-manager-oauth-proxy-review

  authHeaderInjector:
    image:
      repository: ghcr.io/dadav/rhacs-manager-auth-header-injector
      # Defaults to Chart.appVersion if not set
      tag: ""
      pullPolicy: IfNotPresent
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    namespaceAnnotation: rhacs-manager.io/users
    groupAnnotation: rhacs-manager.io/groups
    emailAnnotation: rhacs-manager.io/escalation-email
    cacheTtlSeconds: "300"
    groupCacheTtlSeconds: "60"
    allNamespacesGroups: "" # comma-separated groups that get wildcard (*) namespace access
    clusterRoleName: rhacs-manager-namespace-reader
    clusterRoleBindingName: rhacs-manager-namespace-reader
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
    readinessProbe:
      path: /healthz
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
      successThreshold: 1

  frontend:
    deploymentName: rhacs-manager-frontend
    serviceName: rhacs-manager-frontend
    replicaCount: 2
    image:
      repository: ghcr.io/dadav/rhacs-manager-spoke
      # Defaults to Chart.appVersion if not set
      tag: ""
      pullPolicy: IfNotPresent
    podAnnotations: {}
    podSecurityContext:
      runAsNonRoot: true
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    nodeSelector: {}
    tolerations: []
    affinity: {}
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: rhacs-manager-frontend
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    readinessProbe:
      path: /
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 3
      successThreshold: 1

  service:
    annotations:
      service.beta.openshift.io/serving-cert-secret-name: rhacs-manager-oauth-proxy-tls
    portName: oauth-proxy
    port: 8443
    targetPort: 8443

  route:
    enabled: true
    name: rhacs-manager
    host: rhacs-manager.spoke.example.com
    tls:
      termination: reencrypt
      insecureEdgeTerminationPolicy: Redirect
