# NetworkPolicy in the stackrox namespace to allow ingress from rhacs-manager backend
# to the central-db service on port 5432.
#
# IMPORTANT: This targets the stackrox namespace and must be applied separately:
#   kubectl apply -f deploy/hub/stackrox-networkpolicy.yaml
#
# Verify the podSelector matches your central-db pods:
#   kubectl get pods -n stackrox -l app.kubernetes.io/name=central-db --show-labels
# Adjust the label selector below if your StackRox deployment uses different labels.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rhacs-manager-to-central-db
  namespace: stackrox
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: central-db
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: rhacs-manager
          podSelector:
            matchLabels:
              app: rhacs-manager-backend
      ports:
        - protocol: TCP
          port: 5432
