apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhacs-manager-backend
  namespace: rhacs-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rhacs-manager-backend
  template:
    metadata:
      labels:
        app: rhacs-manager-backend
    spec:
      containers:
        - name: backend
          image: rhacs-manager-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: rhacs-manager-backend-secret
          env:
            # App DB connection params (from CNPG-generated secret)
            - name: APP_DB_HOST
              value: "rhacs-manager-db-rw"
            - name: APP_DB_USER
              valueFrom:
                secretKeyRef:
                  name: rhacs-manager-db-app
                  key: username
            - name: APP_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rhacs-manager-db-app
                  key: password
            - name: APP_DB_NAME
              value: "rhacs_manager"
            # StackRox Central DB connection params (built into URL by config.py)
            - name: STACKROX_DB_HOST
              value: "central-db.stackrox.svc"
            - name: STACKROX_DB_PORT
              value: "5432"
            - name: STACKROX_DB_USER
              value: "postgres"
            - name: STACKROX_DB_NAME
              value: "central_active"
            # Password from central-db-password secret (copied from stackrox namespace)
            - name: STACKROX_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: central-db-password
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
