apiVersion: apps/v1
kind: Deployment
metadata:
  name: rhacs-manager-backend
  namespace: rhacs-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rhacs-manager-backend
  template:
    metadata:
      labels:
        app: rhacs-manager-backend
    spec:
      containers:
        - name: backend
          image: rhacs-manager-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: rhacs-manager-backend-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
