apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - secret.yaml
  - app-db.yaml
  - backend-serviceaccount.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - oauth-proxy.yaml
  - namespace-resolver-rbac.yaml
  - hub-spoke-secret.yaml
  - route.yaml

images:
  - name: rhacs-manager-backend
    newName: ghcr.io/dadav/rhacs-manager-backend
    newTag: latest
  - name: rhacs-manager-spoke
    newName: ghcr.io/dadav/rhacs-manager-spoke
    newTag: latest
  - name: rhacs-manager-namespace-resolver
    newName: ghcr.io/dadav/rhacs-manager-namespace-resolver
    newTag: latest
