# Hub-local spoke secret. The spoke frontend image needs HUB_API_URL to proxy /api/* requests.
# On the hub, this points to the local backend service.
apiVersion: v1
kind: Secret
metadata:
  name: rhacs-manager-hub-spoke-secret
  namespace: rhacs-manager
type: Opaque
stringData:
  # Local backend service URL (no external route needed on hub)
  HUB_API_URL: "http://rhacs-manager-backend:8000"
  # API key matching one of the hub's SPOKE_API_KEYS entries
  SPOKE_API_KEY: "change-me-to-match-hub-key"
  # Cluster name for the hub cluster
  CLUSTER_NAME: "hub"
