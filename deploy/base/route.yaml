# OpenShift Route for the frontend (via oauth-proxy)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rhacs-manager
  namespace: rhacs-manager
spec:
  host: rhacs-manager.apps.example.com
  to:
    kind: Service
    name: rhacs-manager-frontend
  port:
    targetPort: oauth-proxy
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
---
# Internal route for backend API (used by spoke proxies or direct access)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rhacs-manager-api
  namespace: rhacs-manager
spec:
  host: rhacs-manager-api.apps.example.com
  to:
    kind: Service
    name: rhacs-manager-backend
  port:
    targetPort: 8000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
