# Replace all placeholder values before applying.
# Use: kubectl create secret generic rhacs-manager-backend-secret --from-env-file=.env -n rhacs-manager
apiVersion: v1
kind: Secret
metadata:
  name: rhacs-manager-backend-secret
  namespace: rhacs-manager
type: Opaque
stringData:
  # App database (PostgreSQL)
  APP_DATABASE_URL: "postgresql+asyncpg://user:password@postgres:5432/rhacs_manager"
  # StackRox central_active database (read-only)
  STACKROX_DATABASE_URL: "postgresql+asyncpg://postgres:password@central-db.stackrox.svc:5432/central_active"
  # JWT secret for session tokens
  SECRET_KEY: "change-me-to-a-random-secret"
  # Dev mode: set to "true" to bypass OIDC (dev only)
  DEV_MODE: "false"
  DEV_USER_ID: ""
  DEV_USER_NAME: ""
  DEV_USER_EMAIL: ""
  DEV_USER_ROLE: "team_member"
  DEV_TEAM_ID: ""
  # SMTP
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: "rhacs-manager@example.com"
  SMTP_STARTTLS: "true"
  # Application base URL (for email links)
  APP_BASE_URL: "https://rhacs-manager.example.com"
  # Hub-spoke architecture: spoke proxy authentication
  # JSON list of allowed API keys from spoke proxies (e.g. '["key1","key2"]')
  SPOKE_API_KEYS: "[]"
  # JSON dict mapping Keycloak group names to team names (e.g. '{"dev-group":"Dev Team"}')
  GROUP_TEAM_MAPPING: "{}"
  # Keycloak group name that grants sec_team role
  SEC_TEAM_GROUP: "rhacs-sec-team"
