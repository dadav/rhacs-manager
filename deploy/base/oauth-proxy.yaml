# ServiceAccount for oauth-proxy with OAuth redirect annotation
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rhacs-manager-oauth-proxy
  namespace: rhacs-manager
  annotations:
    serviceaccounts.openshift.io/oauth-redirectreference.primary: |
      {"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"rhacs-manager"}}
---
# ClusterRoleBinding so oauth-proxy can validate tokens
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rhacs-manager-oauth-proxy-review
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: rhacs-manager-oauth-proxy
    namespace: rhacs-manager
