# Spoke-specific secrets. Replace placeholder values before applying.
apiVersion: v1
kind: Secret
metadata:
  name: rhacs-manager-spoke-secret
  namespace: rhacs-manager
type: Opaque
stringData:
  # Full URL of the hub backend API route (e.g. https://rhacs-manager-api.hub.example.com)
  HUB_API_URL: "https://rhacs-manager-api.hub.example.com"
  # API key matching one of the hub's SPOKE_API_KEYS entries
  SPOKE_API_KEY: "change-me-to-match-hub-key"
  # Name of this spoke cluster (used in X-Forwarded-Namespaces header)
  CLUSTER_NAME: "spoke-cluster-name"
