# OpenShift Route for spoke — terminates TLS at oauth-proxy
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rhacs-manager
  namespace: rhacs-manager
spec:
  host: rhacs-manager.spoke.example.com
  to:
    kind: Service
    name: rhacs-manager-frontend
  port:
    targetPort: oauth-proxy
  tls:
    termination: reencrypt
    insecureEdgeTerminationPolicy: Redirect
