apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Spoke overlay — frontend + oauth-proxy only, no backend or backend service.
# API requests are proxied from spoke nginx to the hub backend route.
resources:
  - namespace.yaml
  - spoke-secret.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml
  - oauth-proxy.yaml
  - namespace-resolver-rbac.yaml
  - route.yaml

images:
  - name: rhacs-manager-frontend-spoke
    newName: ghcr.io/dadav/rhacs-manager-spoke
    newTag: latest
  - name: rhacs-manager-namespace-resolver
    newName: ghcr.io/dadav/rhacs-manager-namespace-resolver
    newTag: latest
